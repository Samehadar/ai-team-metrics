<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⚡</div>
      <div>
        <div class="title">AI Team Metrics</div>
        <div class="subtitle">Collector</div>
      </div>
    </div>

    <div id="statusBar" class="status-bar status-unknown">
      <span class="status-dot"></span>
      <span id="statusText">Checking cursor.com...</span>
    </div>

    <div id="userCard" class="user-card hidden">
      <div class="user-row">
        <span class="user-label">Account</span>
        <span id="userName" class="user-value">—</span>
      </div>
      <div class="user-row">
        <span class="user-label">Plan</span>
        <span id="userPlan" class="user-value">—</span>
      </div>
      <div class="user-row">
        <span class="user-label">Cycle</span>
        <span id="userCycle" class="user-value">—</span>
      </div>
    </div>

    <div class="field">
      <label for="fileNameInput">Filename prefix</label>
      <input id="fileNameInput" type="text" placeholder="акк_Имя_Фамилия" autocomplete="off">
    </div>

    <div class="field">
      <label>Period</label>
      <div id="periodInfo" class="period-info">— → now</div>
    </div>

    <div class="buttons">
      <button id="btnJson" class="btn btn-primary" disabled>
        <span class="btn-icon">📊</span> Download JSON (full bundle)
      </button>
      <button id="btnCsv" class="btn btn-secondary" disabled>
        <span class="btn-icon">📄</span> Download CSV (usage events)
      </button>
    </div>

    <div id="result" class="result hidden"></div>

    <div class="footer">
      v2.0 · Works only on cursor.com
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
