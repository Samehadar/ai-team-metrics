<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⚡</div>
      <div>
        <div class="title">AI Team Metrics</div>
        <div class="subtitle">Collector</div>
      </div>
    </div>

    <div id="statusBar" class="status-bar status-unknown">
      <span class="status-dot"></span>
      <span id="statusText">Checking cursor.com...</span>
    </div>

    <div class="field">
      <label for="devSelect">Developer</label>
      <select id="devSelect">
        <option value="">— Select name —</option>
        <!-- Add your team members here:
        <option value="Alice_Johnson">Alice Johnson</option>
        <option value="Bob_Smith">Bob Smith</option>
        -->
      </select>
    </div>

    <div class="field">
      <label>Period</label>
      <div class="period-info">Start date — now</div>
    </div>

    <div class="buttons">
      <button id="btnJson" class="btn btn-primary" disabled>
        <span class="btn-icon">📊</span> Download JSON (API)
      </button>
      <button id="btnCsv" class="btn btn-secondary" disabled>
        <span class="btn-icon">📄</span> Download CSV (export)
      </button>
    </div>

    <div id="result" class="result hidden"></div>

    <div class="footer">
      v1.0 · Works only on cursor.com
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
